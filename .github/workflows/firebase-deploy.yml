name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: |
            {
              "type": "${{ secrets.FIREBASE_SA_TYPE }}",
              "project_id": "${{ secrets.FIREBASE_SA_PROJECT_ID }}",
              "private_key_id": "${{ secrets.FIREBASE_SA_PRIVATE_KEY_ID }}",
              "private_key": "${{ secrets.FIREBASE_SA_PRIVATE_KEY }}",
              "client_email": "${{ secrets.FIREBASE_SA_CLIENT_EMAIL }}",
              "client_id": "${{ secrets.FIREBASE_SA_CLIENT_ID }}",
              "auth_uri": "${{ secrets.FIREBASE_SA_AUTH_URI }}",
              "token_uri": "${{ secrets.FIREBASE_SA_TOKEN_URI }}",
              "auth_provider_x509_cert_url": "${{ secrets.FIREBASE_SA_AUTH_PROVIDER_CERT_URL }}",
              "client_x509_cert_url": "${{ secrets.FIREBASE_SA_CLIENT_CERT_URL }}",
              "universe_domain": "${{ secrets.FIREBASE_SA_UNIVERSE_DOMAIN }}"
            }

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" --non-interactive
