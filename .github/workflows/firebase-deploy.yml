name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: nagarro-rimss

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nagarro-rimss/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Create Firebase service account credentials
        run: |
          jq -n \
            --arg type "$FIREBASE_SA_TYPE" \
            --arg project_id "$FIREBASE_SA_PROJECT_ID" \
            --arg private_key_id "$FIREBASE_SA_PRIVATE_KEY_ID" \
            --arg private_key "$FIREBASE_SA_PRIVATE_KEY" \
            --arg client_email "$FIREBASE_SA_CLIENT_EMAIL" \
            --arg client_id "$FIREBASE_SA_CLIENT_ID" \
            --arg auth_uri "$FIREBASE_SA_AUTH_URI" \
            --arg token_uri "$FIREBASE_SA_TOKEN_URI" \
            --arg auth_provider_x509_cert_url "$FIREBASE_SA_AUTH_PROVIDER_CERT_URL" \
            --arg client_x509_cert_url "$FIREBASE_SA_CLIENT_CERT_URL" \
            --arg universe_domain "$FIREBASE_SA_UNIVERSE_DOMAIN" \
            '{
              type: $type,
              project_id: $project_id,
              private_key_id: $private_key_id,
              private_key: $private_key,
              client_email: $client_email,
              client_id: $client_id,
              auth_uri: $auth_uri,
              token_uri: $token_uri,
              auth_provider_x509_cert_url: $auth_provider_x509_cert_url,
              client_x509_cert_url: $client_x509_cert_url,
              universe_domain: $universe_domain
            }' > "$RUNNER_TEMP/firebase-sa.json"
        working-directory: /
        env:
          FIREBASE_SA_TYPE: ${{ secrets.FIREBASE_SA_TYPE }}
          FIREBASE_SA_PROJECT_ID: ${{ secrets.FIREBASE_SA_PROJECT_ID }}
          FIREBASE_SA_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_SA_PRIVATE_KEY_ID }}
          FIREBASE_SA_PRIVATE_KEY: ${{ secrets.FIREBASE_SA_PRIVATE_KEY }}
          FIREBASE_SA_CLIENT_EMAIL: ${{ secrets.FIREBASE_SA_CLIENT_EMAIL }}
          FIREBASE_SA_CLIENT_ID: ${{ secrets.FIREBASE_SA_CLIENT_ID }}
          FIREBASE_SA_AUTH_URI: ${{ secrets.FIREBASE_SA_AUTH_URI }}
          FIREBASE_SA_TOKEN_URI: ${{ secrets.FIREBASE_SA_TOKEN_URI }}
          FIREBASE_SA_AUTH_PROVIDER_CERT_URL: ${{ secrets.FIREBASE_SA_AUTH_PROVIDER_CERT_URL }}
          FIREBASE_SA_CLIENT_CERT_URL: ${{ secrets.FIREBASE_SA_CLIENT_CERT_URL }}
          FIREBASE_SA_UNIVERSE_DOMAIN: ${{ secrets.FIREBASE_SA_UNIVERSE_DOMAIN }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Cleanup credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
        working-directory: /
